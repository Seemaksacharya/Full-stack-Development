<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Akaya+Kanadaka&family=Anek+Kannada:wght@100..800&family=Noto+Serif+Kannada:wght@100..900&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Akaya+Kanadaka&family=Anek+Kannada:wght@100..800&family=Baloo+2:wght@400..800&family=Fredoka:wght@300..700&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Noto+Serif+Kannada:wght@100..900&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
    <h1 class="text">Registration form</h1>
    <p class="note">Free delegate passes are not applicable for cybersecurity solution providers, technology vendors, security service providers or consulting firms.</p>
    <form>
    <div class="grid">
    <div class="field">
    <label>First Name</label>
    <input type="text" placeholder="john">
    </div>
    <div class="field">
    <label>Last Name</label>
    <input type="text" placeholder="Doe">
    </div>
    <div class="field">
    <label>Official Email ID</label>
    <input type="email" placeholder="abc@gmail.com">
    </div>
    <div class="field">
    <label>Company Name</label>
    <input type="text" placeholder="ABC Corp">
    </div>
    <div class="field">
    <label>Job Role</label>
    <input type="text" placeholder="IT">
    </div>
    <div class="field">
    <label>Country</label>
    <select class="select">
        <option>Select your Country</option>
        <option>India</option>
        <option>China</option>
        <option>America</option>
    </select>
    </div>
    <div class="field">
    <label>Phone no</label>
    <div class="phone-box">
    <span class="code">+91</span>
    <input type="tel" placeholder="8987998773">
    </div>
    </div>
    <div class="field">
    <label>Industry</label>
    <select class="select">
        <option>Select your Industry</option>
        <option>Healthcare</option>
        <option>IT</option>
        <option>Retail</option>
    </select>
    </div>
    <div class="link">
    <label>LinkedIn</label>
    <input type="url" placeholder="https://www.linkedin.com">
    </div>
    </div>
    <button type="submit" id="button">Submit</button>
    </div>
    </form>
    <footer>
    <div class="social-icon">
    <a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="https://www.linkedin.com" target="_blank"><i class="fab fa-linkedin"></i></a>
    <a href="https://www.google.com" target="_blank"><i class="fab fa-google"></i></a>
    </div>
    </footer>
</body>
</html>
